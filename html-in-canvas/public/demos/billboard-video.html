 This demo illustrates a hybrid integration of Three.js (for applying the texture) and the native browser 
 HTML-in-Canvas API for applying the CSS transform to the HTML element, playing a high-fidelity MP4 video.
 
 HOW IT AFFECTS CSS TRANSFORM APPLICATION:
 Instead of relying on Three.js's internal rendering of HTML textures, this demo calculates the full 
 Model-View-Projection (MVP) matrix manually and passes it to the browser's native `canvas.getElementTransform()`. 
 This is done for demonstration purpose only, and in ThreeJS you can update the transform with InteractionManager().update()
-->

    <style>

<body>
    <div class="debug-info">
        Interactive 3D Billboard<br>
        Video in HTML-in-Canvas: Use Chrome 151+
    </div>

    <canvas id="gl-canvas" layoutsubtree>
        <form id="billboard-content" onsubmit="event.preventDefault();">
            <button class="badge" type="button">I'm a button. Click me!</button>

            <div id="video-container">
                <figure>
                    <video id="billboard-video" src="../assets/demo-video.mp4" autoplay loop muted playsinline></video>
                    <figcaption>That's an MP4 video playing in canvas!</figcaption>
                </figure>
            </div>

            <h1>HTML-in-Canvas Video Player</h1>
        </form>
    </canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@latest/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@latest/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // --- Ultimate WebGL HIC Signature & Type Compatibility Patch ---
        const originalTexElementImage2D = WebGL2RenderingContext.prototype.texElementImage2D;
        if (originalTexElementImage2D) {
            WebGL2RenderingContext.prototype.texElementImage2D = function(...args) {
                // 1. Resolve Three.js wrapped image objects (e.g. texture.image = { element: DOMElement })
                let element = args[args.length - 1];
                if (element && typeof element === 'object' && !(element instanceof Element)) {
                    if (element.element instanceof Element) {
                        args[args.length - 1] = element.element;
                        element = element.element;
                    }
                }

                // 2. Resolve Chromium 150+ 3-argument vs 6-argument signature mismatch
                if (originalTexElementImage2D.length === 3 && args.length > 3) {
                    const target = args[0];
                    let internalformat = args[2]; // gl.RGBA8 or gl.RGBA
                    
                    // Map unsized gl.RGBA (6408) to sized gl.RGBA8 (32856) for Chromium 150+ compliance
                    if (internalformat === 6408) {
                        internalformat = 32856;
                    }
                    
                    const elem = args[args.length - 1];
                    return originalTexElementImage2D.call(this, target, internalformat, elem);
                }

                return originalTexElementImage2D.apply(this, args);
            };
        }

        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        window.handleButtonClick = function (event) {
            alert("You've just clicked a fully interactive button that's a child element of canvas. You can now build fully interactive canvas!");
        };

        const canvas = document.getElementById('gl-canvas');
        const billboardContent = document.getElementById('billboard-content');

        // Use event delegation on the form to handle pointerdown
        billboardContent.addEventListener('pointerdown', function (event) {
            if (event.target.closest('.badge')) {
                window.handleButtonClick(event);
            }
        });

        // Three.js Scene Setup (High Quality)
        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true
        });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);

        // Spherical controls target setup
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // don't go below ground
        controls.minDistance = 10;
        controls.maxDistance = 100;

        // Cinematic intro camera path coordinates
        const camStartPos = new THREE.Vector3(150, 40, 70);
        const camEndPos = new THREE.Vector3(26, 17, 29);
        const targetStart = new THREE.Vector3(0, 0, 0);
        const targetEnd = new THREE.Vector3(0, 11, 0);

        let introFinished = false;
        const introStartTime = performance.now();
        const introDuration = 2200; // 2.2 seconds

        camera.position.copy(camStartPos);
        controls.target.copy(targetStart);
        controls.update();

        // Lighting Setup
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // Ground Plane (Shadow Receiver)
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.ShadowMaterial({ opacity: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- HTML Texture Setup (Simplifying with THREE.HTMLTexture) ---
        const billboardTexture = new THREE.HTMLTexture(billboardContent);

        const screenMaterial = new THREE.MeshBasicMaterial({
            map: billboardTexture,
            transparent: false
        });

        // Load Billboard Model
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        let screenMesh = null;
        let billboardBounds = null;

        loader.load('./../assets/Billboard.glb', (gltf) => {
            const model = gltf.scene;

            model.rotation.y = 5.4;
            scene.add(model);

            // Enable only casting shadows for the model (prevent self-shadowing)
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = false;

                    if (child.name.toLowerCase().includes('screen') || child.name.toLowerCase().includes('display')) {
                        screenMesh = child;
                        child.material = screenMaterial;

                        // Compute bounds once
                        child.geometry.computeBoundingBox();
                        const box = child.geometry.boundingBox;
                        billboardBounds = {
                            width: box.max.x - box.min.x,
                            height: box.max.y - box.min.y
                        };
                    }
                }
            });

            // If no screen found by name, let's just make a plane for demonstration
            if (!screenMesh) {
                console.warn('Screen mesh not found in GLB. Falling back to custom plane.');
                const fallbackGeom = new THREE.PlaneGeometry(6.9, 3);
                screenMesh = new THREE.Mesh(fallbackGeom, screenMaterial);
                screenMesh.position.set(0, 15, 0);
                screenMesh.rotation.y = 0.69;
                screenMesh.scale.set(2.67, 2.67, 2.67);
                scene.add(screenMesh);

                screenMesh.geometry.computeBoundingBox();
                const box = screenMesh.geometry.boundingBox;
                billboardBounds = {
                    width: box.max.x - box.min.x,
                    height: box.max.y - box.min.y
                };
            }
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 🎬 Intro Camera Animation
            if (!introFinished) {
                const elapsed = performance.now() - introStartTime;
                const t = Math.min(elapsed / introDuration, 1);

                // Smooth cinematic easing (easeOutCubic)
                const ease = 1 - Math.pow(1 - t, 3);

                // Animate camera position
                camera.position.lerpVectors(camStartPos, camEndPos, ease);

                // Animate controls target
                controls.target.lerpVectors(targetStart, targetEnd, ease);

                controls.update();
                camera.lookAt(controls.target);

                if (t >= 1) {
                    introFinished = true;
                }
            }

            // 1. Update Texture from HTML Element (Every Frame)
            const gl = renderer.getContext();
            const textureProperties = renderer.properties.get(billboardTexture);

            if (textureProperties && textureProperties.__webglTexture && gl.texElementImage2D) {
                const webglTexture = textureProperties.__webglTexture;
                gl.bindTexture(gl.TEXTURE_2D, webglTexture);
                gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

                try {
                    // This if block is used to ensure older browser support before the breaking update in Chromium 150
                    // See https://github.com/WICG/html-in-canvas/pull/128/changes
                    if (gl.texElementImage2D.length === 3) {
                        gl.texElementImage2D(gl.TEXTURE_2D, gl.RGBA8, billboardContent);
                    } else {
                        gl.texElementImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, billboardContent);
                    }
                } catch (err) {
                    if (window.debugLogErr === undefined) {
                        console.error('texElementImage2D failed:', err);
                        window.debugLogErr = true;
                    }
                }
            }

            // 2. Interactivity Synchronization (Native HIC getElementTransform)
            if (canvas.getElementTransform && screenMesh) {
                // Ensure camera and screen matrices are fresh before projection
                camera.updateMatrixWorld();
                camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
                screenMesh.updateMatrixWorld();

                // Viewport size in physical pixels for getElementTransform
                const viewportW = canvas.width;
                const viewportH = canvas.height;

                // Note: This demo uses the gl-matrix 'mat4' library for demonstrating raw matrix math.
                // You can use any matrix math library of your choice, e.g. THREE.Matrix4.
                
                // 1. Viewport Matrix
                const viewportMatrix = mat4.fromValues(
                    viewportW / 2, 0, 0, 0,
                    0, -viewportH / 2, 0, 0,
                    0, 0, 1, 0,
                    viewportW / 2, viewportH / 2, 0, 1
                );

                // 2. Local Mapping Matrix: DOM (0,0)-(elemW,elemH) -> Mesh local coords
                const elemW = billboardContent.offsetWidth;
                const elemH = billboardContent.offsetHeight;

                const box = screenMesh.geometry.boundingBox;
                const meshW = box.max.x - box.min.x;
                const meshH = box.max.y - box.min.y;

                const localMatrix = mat4.fromValues(
                    meshW / elemW, 0, 0, 0,
                    0, -meshH / elemH, 0, 0,
                    0, 0, 1, 0,
                    box.min.x, box.max.y, box.max.z, 1
                );

                // 3. Combined MVP Matrix: Viewport * Projection * View * Model * Local
                const mvpMatrix = mat4.create();

                // mvp = projection * view
                mat4.multiply(mvpMatrix, camera.projectionMatrix.elements, camera.matrixWorldInverse.elements);

                // mvp = mvp * model
                mat4.multiply(mvpMatrix, mvpMatrix, screenMesh.matrixWorld.elements);

                // mvp = mvp * local
                mat4.multiply(mvpMatrix, mvpMatrix, localMatrix);

                // mvp = viewport * mvp
                mat4.multiply(mvpMatrix, viewportMatrix, mvpMatrix);

                // Because ThreeJS sets up a matrix that already includes DPR to account for high DPI screens,
                // And the code is using the browser native getElementTransform() for demo purposes,
                // We need to make sure we don't apply DPR twice:
                const dpr = window.devicePixelRatio || 1;
                mat4.scale(mvpMatrix, mvpMatrix, [1 / dpr, 1 / dpr, 1]);

                // 4. Position at canvas origin so the CSS matrix3d maps correctly (matching Three.js)
                billboardContent.style.position = 'absolute';
                billboardContent.style.left = '0';
                billboardContent.style.top = '0';
                billboardContent.style.transformOrigin = '0 0';

                // 5. Get the CSS transform from canvas.getElementTransform
                let syncT = canvas.getElementTransform(billboardContent, new DOMMatrix(Array.from(mvpMatrix)));

                // Workaround for Chromium bug https://crbug.com/512171941 where
                // `transform.is2D` is incorrectly true for a 3D DOMMatrix. The
                // assignment below re-initializes the DOMMatrix which corrects is2D to
                // be false.
                if (syncT && syncT.is2D) {
                    syncT = DOMMatrix.fromFloat64Array(syncT.toFloat64Array());
                }

                if (syncT) {
                    billboardContent.style.transform = syncT.toString();
                    billboardContent.style.zIndex = 10;
                    billboardContent.style.pointerEvents = 'auto';
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>

</html>
